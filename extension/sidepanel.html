<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GKroon-Audio-Recorder-Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #f1f3f5;
      color: #212529;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    h2 {
      margin-top: 0;
      font-size: 18px;
      text-align: center;
      color: #495057;
    }
    .timer-display {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      margin: 20px 0;
      font-family: monospace;
      color: #1c7ed6;
    }
    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      font-weight: bold;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.2s;
    }
    #startBtn { background-color: #37b24d; color: white; }
    #startBtn:hover:not(:disabled) { background-color: #2b8a3e; }
    #startBtn:disabled { background-color: #ced4da; cursor: not-allowed; }
    
    #stopBtn { background-color: #f03e3e; color: white; }
    #stopBtn:hover:not(:disabled) { background-color: #c92a2a; }
    #stopBtn:disabled { background-color: #ced4da; cursor: not-allowed; }

    .status-bar {
      font-size: 12px;
      text-align: center;
      font-weight: 500;
      color: #868e96;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>GKroon Audio Recorder</h2>
    <div class="timer-display" id="timer">00:00:00</div>
    <button id="startBtn">Start Recording Tab</button>
    <button id="stopBtn" disabled>Stop & Normalize</button>
    <div class="status-bar" id="status">Ready to capture.</div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
